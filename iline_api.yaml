        in: query
        description: A search term.
        schema:
          type: string
      - in: path
        name: car_wash_id
        schema:
          type: string
          pattern: ^[0-9a-f-]{13}-4[0-9a-f]{3}-[89ab][0-9a-f-]{16}$
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      tags:
      - Orders
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
