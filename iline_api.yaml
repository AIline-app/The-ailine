components:
  schemas:
    Box:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
      required:
      - id
    CampaignBrief:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          readOnly: true
      required:
      - id
      - name
    Car:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        number:
          type: string
          maxLength: 15
          minLength: 1
      required:
      - id
      - number
    CarWashCarTypes:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          title: Car type
          maxLength: 255
        description:
          type: string
          maxLength: 255
      required:
      - description
      - id
      - name
    CarWashChange:
      type: object
      properties:
        name:
          type: string
          maxLength: 40
        address:
          type: string
          maxLength: 300
        location:
          type: string
          nullable: true
          maxLength: 300
      required:
      - address
      - name
    CarWashDocumentsPrivate:
      type: object
      properties:
