openapi: 3.0.3
info:
  title: I-Line API
  version: 1.0.0
  description: Online car wash queue application
paths:
  /api/v1/_auth/swagger/login:
    post:
      operationId: _auth_swagger_login_create
      description: Authenticate using phone and password via allauth proxy. On success,
        sets authentication cookies in the response for subsequent authorized requests
        in Swagger UI.
      summary: Log in for Swagger UI
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                password:
                  type: string
              required:
              - phone
              - password
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Login successful
          description: ''
        '400':
          description: Bad request
        '403':
          description: Forbidden
  /api/v1/car-wash/:
    get:
      operationId: car_wash_list
      description: List public car washes for anonymous users and both public and
        own car washes for authenticated users.
      summary: List car washes
      tags:
      - Car wash
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CarWashPrivateRead'
          description: ''
    post:
      operationId: car_wash_create
      description: Create a new car wash with settings, documents and initial boxes
        amount.
      summary: Create a car wash
      tags:
      - Car wash
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarWashWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CarWashWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CarWashWrite'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarWashPrivateRead'
          description: ''
        '400':
          description: Validation error
  /api/v1/car-wash/{car_wash_id}/:
    get:
      operationId: car_wash_retrieve
      description: Retrieve a car wash by id. Returns detailed info for owners, public
        info otherwise.
      summary: Retrieve a car wash
      parameters:
      - in: path
        name: car_wash_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Car Wash.
        required: true
      tags:
      - Car wash
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarWashPrivateRead'
          description: ''
        '404':
          description: Not found
    put:
      operationId: car_wash_update
      description: Update existing car wash fields, nested settings/documents and
        boxes amount.
      summary: Update a car wash
      parameters:
      - in: path
        name: car_wash_id
        schema:
          type: string
        required: true
      tags:
      - Car wash
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarWashChange'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CarWashChange'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CarWashChange'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarWashPrivateRead'
          description: ''
        '400':
          description: Validation error
    patch:
      operationId: car_wash_partial_update
      summary: Partially update a car wash
      parameters:
      - in: path
        name: car_wash_id
        schema:
          type: string
        required: true
      tags:
      - Car wash
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCarWashChange'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCarWashChange'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCarWashChange'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarWashPrivateRead'
          description: ''
    delete:
      operationId: car_wash_destroy
      summary: Delete a car wash
      parameters:
      - in: path
        name: car_wash_id
        schema:
          type: string
        required: true
      tags:
      - Car wash
      security:
      - cookieAuth: []
      responses:
        '204':
          description: Deleted
        '403':
          description: Forbidden
  /api/v1/car-wash/{car_wash_id}/box/:
