# Nginx reverse proxy for Django (Gunicorn) with SSL
# Assumes web service (gunicorn) is reachable at http://web:8000 inside the Docker network

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP: redirect everything to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health endpoint for Docker healthcheck (allow on HTTP too)
    location = /healthz/ { return 200 'ok'; add_header Content-Type text/plain; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: terminate TLS and proxy to Django
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name i-line.kz;

    # TLS certificates (mount your real certs into ./nginx/certs)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Recommended security options
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;

    # OCSP stapling (optional if your CA supports it)
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # Max upload size (tune as needed)
    client_max_body_size 20m;

    # Serve media files directly
    location /media/ {
        alias /app/media/;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        expires 1h;
    }

    # Proxy everything else to Django (Gunicorn)
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }

    # Simple health endpoint (HTTPS)
    location = /healthz/ { return 200 'ok'; add_header Content-Type text/plain; }

    # Security headers (can be adjusted per app needs)
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header X-Frame-Options DENY always;
}
